<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダブルクロス ブリードスロット</title>
<style>
  :root{
    --bg:#0d0f1a;--panel:#161a2e;--panel2:#1d2238;--line:#2c3357;
    --txt:#e6e8f5;--sub:#9aa0c8;--accent:#c8324a;--accent2:#7b4dff;--gold:#f5c542;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:radial-gradient(circle at 50% -10%, #1f2547 0%, var(--bg) 55%);
    color:var(--txt);min-height:100vh;padding:24px 16px 50px;
    display:flex;flex-direction:column;align-items:center;
  }
  header{text-align:center;margin-bottom:18px;}
  header h1{font-size:1.5rem;letter-spacing:.08em;margin:0 0 4px;}
  header h1 .sub{color:var(--gold);}
  header p{color:var(--sub);font-size:.82rem;margin:0;}

  .machine{
    background:linear-gradient(160deg,#23284a,#161a2e);
    border:2px solid #3a4170;border-radius:20px;
    padding:22px 18px;max-width:760px;width:100%;
    box-shadow:0 0 0 4px rgba(123,77,255,.12), 0 18px 50px rgba(0,0,0,.5);
  }
  .reels{display:flex;gap:12px;justify-content:center;}
  .reel{
    flex:1;min-width:0;background:#0a0c16;border:2px solid #3a4170;border-radius:12px;
    height:150px;overflow:hidden;position:relative;
  }
  .reel::before,.reel::after{
    content:"";position:absolute;left:0;right:0;height:46px;z-index:2;pointer-events:none;
  }
  .reel::before{top:0;background:linear-gradient(#0a0c16,transparent);}
  .reel::after{bottom:0;background:linear-gradient(transparent,#0a0c16);}
  .reel .window{
    position:absolute;top:50%;left:6px;right:6px;height:54px;transform:translateY(-50%);
    border:2px solid var(--gold);
    z-index:5;pointer-events:none;border-radius:4px;
    box-shadow:0 0 14px rgba(245,197,66,.3) inset;
    transition:box-shadow .15s, border-color .15s;
  }
  .reel.flash .window{
    border-color:#fff;
    animation:rainbowFlash .6s ease-out;
  }
  .reel.lit .window{
    border-color:#fff;
    box-shadow:
      0 0 22px rgba(180,80,255,.55) inset,
      0 0 16px rgba(60,160,255,.45) inset;
  }
  @keyframes rainbowFlash{
    0%{
      box-shadow:0 0 30px 6px rgba(255,60,60,.9) inset, 0 0 24px 4px rgba(255,60,60,.8);
      border-color:#ff3c3c;
    }
    25%{
      box-shadow:0 0 34px 8px rgba(255,200,0,.95) inset, 0 0 28px 6px rgba(255,200,0,.85);
      border-color:#ffc800;
    }
    50%{
      box-shadow:0 0 34px 8px rgba(60,255,120,.95) inset, 0 0 28px 6px rgba(60,255,120,.85);
      border-color:#3cff78;
    }
    75%{
      box-shadow:0 0 34px 8px rgba(60,160,255,.95) inset, 0 0 28px 6px rgba(60,160,255,.85);
      border-color:#3ca0ff;
    }
    100%{
      box-shadow:0 0 34px 8px rgba(180,80,255,.95) inset, 0 0 28px 6px rgba(180,80,255,.85);
      border-color:#b450ff;
    }
  }
  .strip{position:absolute;left:0;right:0;top:0;will-change:transform;}
  .cell{height:54px;display:flex;align-items:center;justify-content:center;gap:6px;padding:0 6px;}
  .cell .sw{display:flex;gap:3px;}
  .cell .sw span{width:9px;height:22px;border-radius:3px;}
  .cell .txt{font-size:.78rem;font-weight:bold;line-height:1.15;text-align:center;}
  .cell .ty{font-size:.58rem;color:var(--sub);}

  .controls{margin-top:18px;text-align:center;}
  .lever{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;color:#fff;font-size:1.05rem;font-weight:bold;letter-spacing:.05em;
    padding:14px 38px;border-radius:40px;cursor:pointer;
    box-shadow:0 6px 18px rgba(123,77,255,.4);transition:.15s;
  }
  .lever:active{transform:translateY(2px);box-shadow:0 2px 8px rgba(123,77,255,.4);}
  .lever:disabled{opacity:.5;cursor:not-allowed;}
  .modebtn{background:var(--panel);border:1px solid var(--line);color:var(--sub);padding:9px 22px;border-radius:30px;cursor:pointer;font-size:.85rem;font-weight:bold;transition:.15s;}
  .modebtn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;}

  .opts{max-width:760px;width:100%;margin:16px auto 0;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .opts .row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .chk{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--sub);}
  .chk input{width:16px;height:16px;accent-color:var(--gold);}
  .opts .hint{text-align:center;color:var(--sub);font-size:.72rem;margin:10px 0 0;}

  .result{max-width:760px;width:100%;margin:16px auto 0;}
  .result h3{text-align:center;font-size:.9rem;color:var(--gold);margin:0 0 10px;}
  .picks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .pick{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;}
  .pick .ty{font-size:.62rem;color:var(--sub);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:1px 8px;display:inline-block;margin-bottom:6px;}
  .pick .sw{display:flex;gap:3px;justify-content:center;margin-bottom:6px;}
  .pick .sw span{width:12px;height:24px;border-radius:3px;}
  .pick .nm{font-size:.86rem;font-weight:bold;line-height:1.3;}
  .pick .act{margin-top:8px;}
  .pick .act button{background:transparent;border:1px solid var(--line);color:var(--sub);font-size:.68rem;padding:4px 10px;border-radius:6px;cursor:pointer;}
  .pick .act button:hover{border-color:var(--gold);color:var(--txt);}
  .pick.marked{border-color:#2f9e6e;}
  .pick.marked .act button{border-color:#2f9e6e;color:#2f9e6e;}
  .pick.tri{padding:18px;}
  .pick.tri .nm{font-size:1.05rem;}
  .pick.tri .sw span{width:16px;height:30px;}
  .msg{text-align:center;color:var(--sub);font-size:.85rem;margin-top:14px;}

  .stat{max-width:760px;width:100%;margin:16px auto 0;display:flex;gap:10px;justify-content:center;}
  .stat .box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 16px;text-align:center;}
  .stat .num{font-size:1.2rem;font-weight:bold;}
  .stat .lbl{font-size:.66rem;color:var(--sub);}
  @media(max-width:560px){
    .picks{grid-template-columns:1fr;}
    .cell .txt{font-size:.68rem;}
  }
</style>
</head>
<body>
<header>
  <h1>ブリード <span class="sub">スロット</span></h1>
  <p id="subtitle">レバーを引いて、ピュア＆クロスから組み合わせを3つ抽選</p>
</header>

<div class="modes" style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;">
  <button class="modebtn active" data-m="pc" onclick="setMode('pc')">ピュア / クロス</button>
  <button class="modebtn" data-m="tri" onclick="setMode('tri')">トライブリード</button>
</div>

<div class="machine">
  <div class="reels">
    <div class="reel"><div class="window"></div><div class="strip" id="strip0"></div></div>
    <div class="reel"><div class="window"></div><div class="strip" id="strip1"></div></div>
    <div class="reel"><div class="window"></div><div class="strip" id="strip2"></div></div>
  </div>
  <div class="controls">
    <button class="lever" id="lever" onclick="spin()">レバーを引く</button>
  </div>
</div>

<div class="opts">
  <div class="row">
    <label class="chk"><input type="checkbox" id="allowUro">ウロボロスを含む</label>
    <label class="chk"><input type="checkbox" id="allowAza">アザトースを含む</label>
    <label class="chk"><input type="checkbox" id="allowMis">ミストルティンを含む</label>
  </div>
  <p class="hint">チェックを入れた追加シンドロームのみ抽選対象に含まれます（デフォルトは基本12種のみ）</p>
</div>

<div class="result" id="result" style="display:none;">
  <h3>本日のお題</h3>
  <div class="picks" id="picks"></div>
  <p class="hint" style="margin-top:10px;">「作成済にする」で記録できます（カウントに反映されます）</p>
</div>

<div class="stat">
  <div class="box"><div class="num" id="doneNum">0</div><div class="lbl">作成済</div></div>
  <div class="box"><div class="num" id="poolNum">120</div><div class="lbl">抽選対象</div></div>
</div>

<div class="msg" id="msg"></div>

<script>
const syndromes = [
  {n:"エンジェルハィロゥ",c:"#5dade2"},
  {n:"バロール",c:"#c0392b"},
  {n:"ブラム＝ストーカー",c:"#8e44ad"},
  {n:"ブラックドッグ",c:"#f1c40f"},
  {n:"キュマイラ",c:"#d35400"},
  {n:"エグザイル",c:"#16a085"},
  {n:"ハヌマーン",c:"#e67e22"},
  {n:"モルフェウス",c:"#2980b9"},
  {n:"ノイマン",c:"#27ae60"},
  {n:"サラマンダー",c:"#e74c3c"},
  {n:"オルクス",c:"#7f8c8d"},
  {n:"ソラリス",c:"#ff8c00"},
  {n:"ウロボロス",c:"#9b59b6"},
  {n:"アザトース",c:"#34495e"},
  {n:"ミストルティン",c:"#1abc9c"}
];

const combos = [];
syndromes.forEach((s,i)=>combos.push({type:"pure",idx:[i]}));
for(let i=0;i<syndromes.length;i++)
  for(let j=i+1;j<syndromes.length;j++)
    combos.push({type:"cross",idx:[i,j]});

const done = combos.map(()=>false);
const triDone = {}; // "i-j-k" => true
let spinning=false;
let mode='pc'; // 'pc' = ピュア/クロス, 'tri' = トライ
function triKey(idxArr){return [...idxArr].sort((a,b)=>a-b).join('-');}

// トライ用：許可されたシンドローム単体インデックスのプール
function synPool(){
  const blocked=[];
  if(!document.getElementById('allowUro').checked) blocked.push(12);
  if(!document.getElementById('allowAza').checked) blocked.push(13);
  if(!document.getElementById('allowMis').checked) blocked.push(14);
  const pool=[];
  syndromes.forEach((s,i)=>{ if(!blocked.includes(i)) pool.push(i); });
  return pool;
}

function setMode(m){
  if(spinning) return;
  mode=m;
  document.querySelectorAll('.modebtn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));
  document.getElementById('subtitle').textContent =
    m==='pc' ? 'レバーを引いて、ピュア＆クロスから組み合わせを3つ抽選'
             : 'レバーを引いて、3つのシンドロームでトライブリードを1つ抽選';
  document.getElementById('result').style.display='none';
  document.querySelectorAll('.reel').forEach(rl=>rl.classList.remove('flash','lit'));
  initReels();
  updateStat();
}

// 初期リール表示（モードに応じた中身）
function initReels(){
  ['strip0','strip1','strip2'].forEach((id)=>{
    const strip=document.getElementById(id);
    let html='';
    for(let k=0;k<5;k++){
      if(mode==='pc'){
        const c=combos[Math.floor(Math.random()*combos.length)];
        html+=`<div class="cell">${cellHTML(c)}</div>`;
      }else{
        const i=Math.floor(Math.random()*syndromes.length);
        html+=`<div class="cell">${synCellHTML(i)}</div>`;
      }
    }
    strip.innerHTML=html;
    strip.style.transition='none';
    strip.style.transform='translateY(48px)';
  });
}

function comboName(c){return c.idx.map(i=>syndromes[i].n).join(" × ");}
function cellHTML(c){
  const sw=c.idx.map(idx=>`<span style="background:${syndromes[idx].c}"></span>`).join('');
  return `<div class="sw">${sw}</div><div><div class="ty">${c.type==="pure"?"ピュア":"クロス"}</div><div class="txt">${comboName(c)}</div></div>`;
}
// トライ用：単一シンドロームのセル
function synCellHTML(i){
  return `<div class="sw"><span style="background:${syndromes[i].c}"></span></div><div><div class="txt">${syndromes[i].n}</div></div>`;
}

function currentPool(){
  const blocked=[];
  if(!document.getElementById('allowUro').checked) blocked.push(12);
  if(!document.getElementById('allowAza').checked) blocked.push(13);
  if(!document.getElementById('allowMis').checked) blocked.push(14);
  const pool=[];
  combos.forEach((c,i)=>{
    if(c.idx.some(x=>blocked.includes(x))) return;
    pool.push(i);
  });
  return pool;
}

function nCr(n,r){if(r<0||r>n)return 0;let v=1;for(let k=0;k<r;k++)v=v*(n-k)/(k+1);return Math.round(v);}

function updateStat(){
  if(mode==='pc'){
    document.getElementById('doneNum').textContent=done.filter(Boolean).length;
    document.getElementById('poolNum').textContent=currentPool().length;
  }else{
    document.getElementById('doneNum').textContent=Object.keys(triDone).length;
    const n=synPool().length;
    document.getElementById('poolNum').textContent=nCr(n,3);
  }
}

// リールに流すダミー帯を作る（最後に当選セルを置く）
// pool: インデックス配列, winIdx: 当選インデックス, renderCell: idx→HTML
function buildStrip(stripEl, pool, winIdx, renderCell){
  const cellH=54;
  const fillers=48;
  let html='';
  for(let k=0;k<fillers;k++){
    const r=pool[Math.floor(Math.random()*pool.length)];
    html+=`<div class="cell">${renderCell(r)}</div>`;
  }
  // 当選セル（停止位置）
  html+=`<div class="cell win">${renderCell(winIdx)}</div>`;
  // 後ろにもダミー
  for(let k=0;k<3;k++){
    const r=pool[Math.floor(Math.random()*pool.length)];
    html+=`<div class="cell">${renderCell(r)}</div>`;
  }
  stripEl.innerHTML=html;
  // 当選セルが窓中央に来る位置を計算
  const totalCells=fillers+1+3;
  const winCellIndex=fillers; // 0-based
  // 窓は reel 高さ150 の中央。strip先頭からの停止オフセット
  const stopY = -(winCellIndex*cellH) + (150/2 - cellH/2);
  return stopY;
}

function spin(){
  if(spinning) return;
  const msg=document.getElementById('msg');

  if(mode==='pc'){
    const pool=currentPool();
    if(pool.length===0){
      msg.textContent='抽選できる組み合わせがありません（条件によります）';
      document.getElementById('result').style.display='none';
      return;
    }
    // 重複なしで最大3つ抽選（3つの組み合わせ）
    const shuffled=[...pool];
    for(let k=shuffled.length-1;k>0;k--){const r=Math.floor(Math.random()*(k+1));[shuffled[k],shuffled[r]]=[shuffled[r],shuffled[k]];}
    const wins=shuffled.slice(0,Math.min(3,pool.length));
    while(wins.length<3) wins.push(null);
    runReels(pool, wins, idx=>cellHTML(combos[idx]), ()=>showResultPC(wins));
  }else{
    const sp=synPool();
    if(sp.length<3){
      msg.textContent='トライには3シンドローム必要です。追加シンドロームのチェックを増やしてください';
      document.getElementById('result').style.display='none';
      return;
    }
    // 重複なしでシンドローム3つ抽選（各リール1つ）
    const shuffled=[...sp];
    for(let k=shuffled.length-1;k>0;k--){const r=Math.floor(Math.random()*(k+1));[shuffled[k],shuffled[r]]=[shuffled[r],shuffled[k]];}
    const wins=shuffled.slice(0,3);
    runReels(sp, wins, idx=>synCellHTML(idx), ()=>showResultTri(wins));
  }
}

// 共通：3リールを回して停止・発光させ、完了時にonDoneを呼ぶ
function runReels(pool, wins, renderCell, onDone){
  document.getElementById('msg').textContent='';
  spinning=true;
  document.getElementById('lever').disabled=true;
  document.getElementById('result').style.display='none';
  document.querySelectorAll('.reel').forEach(rl=>rl.classList.remove('flash','lit'));

  const stopYs=[];
  for(let r=0;r<3;r++){
    const strip=document.getElementById('strip'+r);
    const winIdx = wins[r]!==null && wins[r]!==undefined ? wins[r] : pool[Math.floor(Math.random()*pool.length)];
    const stopY=buildStrip(strip, pool, winIdx, renderCell);
    stopYs.push(stopY);
    const startY = stopY + 40*54;
    strip.style.transition='none';
    strip.style.transform=`translateY(${startY}px)`;
  }

  void document.getElementById('strip0').offsetHeight;

  let finished=0;
  for(let r=0;r<3;r++){
    const strip=document.getElementById('strip'+r);
    const reel=strip.closest('.reel');
    const dur=3.0 + r*0.45;
    strip.style.transition=`transform ${dur}s cubic-bezier(.12,.7,.2,1)`;
    strip.style.transform=`translateY(${stopYs[r]}px)`;
    setTimeout(()=>{
      reel.classList.add('flash');
      setTimeout(()=>{reel.classList.remove('flash');reel.classList.add('lit');},600);
      finished++;
      if(finished===3) setTimeout(onDone,650);
    }, dur*1000+60);
  }
}

function showResultPC(wins){
  const real=wins.filter(w=>w!==null);
  const el=document.getElementById('picks');
  el.innerHTML='';
  real.forEach(idx=>{
    const c=combos[idx];
    const sw=c.idx.map(i=>`<span style="background:${syndromes[i].c}"></span>`).join('');
    const d=document.createElement('div');
    d.className='pick'+(done[idx]?' marked':'');
    d.innerHTML=`
      <div class="ty">${c.type==="pure"?"ピュア":"クロス"}</div>
      <div class="sw">${sw}</div>
      <div class="nm">${comboName(c)}</div>
      <div class="act"><button onclick="markDone(${idx},this)">${done[idx]?'作成済 ✓':'作成済にする'}</button></div>
    `;
    el.appendChild(d);
  });
  document.getElementById('result').style.display='block';
  document.getElementById('lever').disabled=false;
  spinning=false;
  updateStat();
  if(real.length<3){
    document.getElementById('msg').textContent=`抽選対象が残り${real.length}通りのため、${real.length}つだけ表示しています`;
  }
}

// トライ結果：3シンドローム1つの組み合わせを1枚で表示
function showResultTri(wins){
  const key=triKey(wins);
  const sw=[...wins].sort((a,b)=>a-b).map(i=>`<span style="background:${syndromes[i].c}"></span>`).join('');
  const name=[...wins].sort((a,b)=>a-b).map(i=>syndromes[i].n).join(" × ");
  const el=document.getElementById('picks');
  el.innerHTML='';
  const d=document.createElement('div');
  d.className='pick tri'+(triDone[key]?' marked':'');
  d.style.gridColumn='1 / -1';
  d.innerHTML=`
    <div class="ty">トライブリード</div>
    <div class="sw">${sw}</div>
    <div class="nm">${name}</div>
    <div class="act"><button onclick="markTriDone('${key}',this)">${triDone[key]?'作成済 ✓':'作成済にする'}</button></div>
  `;
  el.appendChild(d);
  document.getElementById('result').style.display='block';
  document.getElementById('lever').disabled=false;
  spinning=false;
  updateStat();
}

function markTriDone(key,btn){
  triDone[key]=!triDone[key];
  if(!triDone[key]) delete triDone[key];
  btn.textContent=(key in triDone)?'作成済 ✓':'作成済にする';
  btn.closest('.pick').classList.toggle('marked',key in triDone);
  updateStat();
}

function markDone(idx,btn){
  done[idx]=!done[idx];
  btn.textContent=done[idx]?'作成済 ✓':'作成済にする';
  btn.closest('.pick').classList.toggle('marked',done[idx]);
  updateStat();
}

// 初期リール表示
initReels();

document.getElementById('allowUro').addEventListener('change',updateStat);
document.getElementById('allowAza').addEventListener('change',updateStat);
document.getElementById('allowMis').addEventListener('change',updateStat);
updateStat();
</script>
</body>
</html>
