<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPCガチャ — Capsule Roster ULTRA PREMIUM</title>
<style>
:root{
  --ink:#efe9df;--ink-dim:#8b8478;--bg:#07080c;--bg-2:#10121a;
  --card:#14161f;--card-edge:#272b38;--line:#2c303c;
  --pop:#e8553b;--pop-4:#5b8dd6;--gold:#e6c067;--gold-deep:#b8923c;
  --mg1:#f4dd8e;--mg2:#caa23f;--mg3:#8a6a23;
  --serif:"Hiragino Mincho ProN","Yu Mincho",serif;
  --round:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  --mono:"SFMono-Regular","Consolas",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(circle at 18% -8%,rgba(230,192,103,.12),transparent 42%),radial-gradient(circle at 88% 108%,rgba(91,141,214,.10),transparent 42%),var(--bg);color:var(--ink);font-family:var(--round);min-height:100vh;padding:clamp(1rem,3vw,2.5rem);line-height:1.6;position:relative}
.wrap{max-width:900px;margin:0 auto}
header{text-align:center;margin-bottom:1.8rem}
.eyebrow{font-family:var(--mono);font-size:.66rem;letter-spacing:.4em;color:var(--gold);text-transform:uppercase}
h1{font-size:clamp(2.2rem,7vw,3.4rem);font-weight:800;letter-spacing:.08em;margin-top:.3rem;background:linear-gradient(180deg,#fbf3da,#e6c067 55%,#b8923c);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-family:var(--mono);font-size:.6rem;letter-spacing:.25em;color:var(--ink-dim);margin-top:.4rem}
.panel{display:grid;grid-template-columns:1fr;gap:1.5rem}
@media(min-width:720px){.panel{grid-template-columns:280px 1fr;align-items:start}}
.controls{background:linear-gradient(180deg,var(--card),#10121a);border:1px solid var(--card-edge);border-radius:18px;padding:1.3rem;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 24px rgba(0,0,0,.4)}
.ctl-title{font-family:var(--mono);font-size:.62rem;letter-spacing:.25em;color:var(--ink-dim);text-transform:uppercase;margin-bottom:.7rem}
.modes{display:flex;gap:.5rem;margin-bottom:1.4rem}
.mode{flex:1;font-family:var(--round);font-weight:700;font-size:.9rem;padding:.7rem;border-radius:12px;border:1px solid var(--line);background:transparent;color:var(--ink-dim);cursor:pointer;transition:all .18s}
.mode:hover{border-color:var(--ink-dim);color:var(--ink)}
.mode.on{background:linear-gradient(180deg,#f4dd8e,#caa23f);color:#2a1f08;border-color:var(--gold);box-shadow:0 2px 10px rgba(202,162,63,.3)}
.checks{display:flex;flex-direction:column;gap:.55rem}
.check{display:flex;align-items:center;gap:.7rem;padding:.6rem .75rem;border-radius:12px;border:1px solid var(--line);cursor:pointer;transition:all .15s;user-select:none;font-weight:600;font-size:.92rem}
.check:hover{background:var(--bg-2)}
.check .box{width:20px;height:20px;border-radius:6px;flex-shrink:0;border:2px solid var(--ink-dim);display:grid;place-items:center;transition:all .15s}
.check .box::after{content:"\2713";color:#fff;font-size:.8rem;opacity:0}
.check.on .box{background:var(--pop);border-color:var(--pop)}.check.on .box::after{opacity:1}
.check.on{border-color:var(--card-edge);background:var(--bg-2)}
.hint-mix{font-size:.66rem;color:var(--ink-dim);margin-top:.8rem;line-height:1.5}
.rates{font-family:var(--mono);font-size:.56rem;letter-spacing:.05em;color:var(--ink-dim);margin-top:.9rem;padding-top:.8rem;border-top:1px solid var(--line);line-height:1.8}
.rates b.g{color:var(--gold)}
.rates b.r{background:linear-gradient(90deg,#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff);-webkit-background-clip:text;background-clip:text;color:transparent}

/* MACHINE */
.machine-area{display:flex;flex-direction:column;align-items:center}
.machine{width:100%;max-width:360px;position:relative;user-select:none;filter:drop-shadow(0 20px 40px rgba(0,0,0,.6))}
.crown{position:relative;z-index:4;width:62%;margin:0 auto -2px;height:36px;background:linear-gradient(180deg,#fbe8a0,#d4a63e 40%,#a07a24 80%,#785a1a);border-radius:14px 14px 6px 6px;box-shadow:inset 0 2px 2px rgba(255,255,255,.7),inset 0 -2px 4px rgba(100,70,20,.5),0 -4px 12px rgba(244,221,142,.35)}
.crown::before{content:"";position:absolute;left:50%;top:-12px;transform:translateX(-50%);width:24px;height:24px;background:radial-gradient(circle at 40% 35%,#fff5d0,#e6c067 50%,#a07a24);border-radius:50%;box-shadow:0 0 12px rgba(244,221,142,.7),inset 0 2px 3px rgba(255,255,255,.8)}
.crown::after{content:"";position:absolute;inset:6px 20%;height:3px;border-radius:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent)}
.crown-gems{position:absolute;bottom:6px;left:0;right:0;display:flex;justify-content:center;gap:16px}
.crown-gems span{width:8px;height:8px;border-radius:50%;box-shadow:0 0 6px currentColor,inset 0 1px 2px rgba(255,255,255,.8)}
.crown-gems .r{background:radial-gradient(circle at 35% 30%,#ff9e9e,#d32f2f);color:#ff5252}
.crown-gems .b{background:radial-gradient(circle at 35% 30%,#90caf9,#1565c0);color:#42a5f5}
.crown-gems .gm{background:radial-gradient(circle at 35% 30%,#a5d6a7,#2e7d32);color:#66bb6a}
.dome-wrap{position:relative;z-index:3}
.dome{position:relative;aspect-ratio:1;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 32% 24%,rgba(255,255,255,.6),rgba(255,255,255,.06) 40%,transparent 58%),radial-gradient(circle at 70% 80%,rgba(100,130,180,.15),transparent 40%),linear-gradient(160deg,rgba(140,165,200,.3),rgba(40,55,80,.5));box-shadow:inset 0 -30px 60px rgba(0,0,0,.6),inset 0 14px 36px rgba(255,255,255,.12),0 0 0 4px #3a414e,0 0 0 6px rgba(202,162,63,.4),0 0 0 8px #2c303c}
.dome::before{content:"";position:absolute;z-index:5;width:45%;height:50%;top:4%;left:8%;border-radius:50%;background:radial-gradient(ellipse at 50% 60%,rgba(255,255,255,.35),transparent 70%);pointer-events:none}
.dome::after{content:"";position:absolute;z-index:5;inset:0;border-radius:50%;pointer-events:none;background:linear-gradient(125deg,transparent 38%,rgba(255,255,255,.18) 45%,transparent 52%)}
.dome-ring{position:absolute;inset:-8px;border-radius:50%;z-index:2;pointer-events:none;background:conic-gradient(from 45deg,#785a1a,#f4dd8e 25%,#d4a63e 40%,#f4dd8e 55%,#a07a24 70%,#f4dd8e 85%,#785a1a);-webkit-mask:radial-gradient(circle,transparent 48%,#000 49%);mask:radial-gradient(circle,transparent 48%,#000 49%)}
.capsules-in{position:absolute;inset:14%;display:flex;flex-wrap:wrap;align-content:flex-end;justify-content:center;gap:5px;padding-bottom:6%;z-index:1}
.mini{width:26px;height:26px;border-radius:50%;box-shadow:inset 0 -5px 7px rgba(0,0,0,.3),inset 0 4px 5px rgba(255,255,255,.45)}
.mini::before{content:"";display:block;height:50%;border-radius:50% 50% 0 0/100% 100% 0 0;background:rgba(255,255,255,.3)}
.mini.gold-m{background:linear-gradient(180deg,#f4dd8e,#caa23f)!important;box-shadow:0 0 7px rgba(230,192,103,.7),inset 0 -4px 6px rgba(120,90,30,.4)}
.mini.iris-m{background:conic-gradient(from 0deg,#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff,#ff5f6d)!important;box-shadow:0 0 9px rgba(255,255,255,.7),inset 0 -4px 6px rgba(0,0,0,.2)}

@keyframes jiggle{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-4px) rotate(-6deg)}75%{transform:translateY(3px) rotate(5deg)}}
.dome.shaking .mini{animation:jiggle .28s ease infinite}
.dome.charge-gold{animation:chargeGold 0.9s ease}
.dome.charge-iris{animation:chargeIris 2.2s cubic-bezier(0.15, 0.85, 0.35, 1)}
@keyframes chargeGold{50%{box-shadow:inset 0 0 60px rgba(255,215,120,.7),0 0 56px rgba(240,200,100,.8),0 0 0 4px #3a414e,0 0 0 6px rgba(202,162,63,.4)}}
@keyframes chargeIris{0%{box-shadow:inset 0 0 20px rgba(0,0,0,1)} 30%{box-shadow:inset 0 0 70px rgba(255,50,50,0.9),0 0 40px rgba(255,50,50,0.8)} 60%{box-shadow:inset 0 0 90px rgba(50,150,255,0.9),0 0 60px rgba(50,255,100,0.8)} 80%{box-shadow:inset 0 0 110px rgba(200,50,255,1),0 0 90px rgba(255,200,50,1)} 100%{box-shadow:inset 0 0 150px rgba(255,255,255,1),0 0 120px rgba(255,255,255,1),0 0 0 10px #fff}}
.m-body{margin:-4px auto 0;width:84%;position:relative;z-index:2;background:linear-gradient(180deg,#34384a,#22252f 30%,#1a1d26 70%,#14161f);border-radius:4px 4px 22px 22px;padding:1rem 1rem 1.5rem;box-shadow:inset 0 4px 0 rgba(255,255,255,.06),0 14px 30px rgba(0,0,0,.55)}
.m-body-frame{position:absolute;inset:0;border-radius:4px 4px 22px 22px;pointer-events:none;background:linear-gradient(180deg,rgba(244,221,142,.6),rgba(160,122,36,.3) 50%,rgba(120,90,26,.2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:2px}
.plate{width:70%;margin:0 auto .7rem;padding:.3rem;border-radius:6px;text-align:center;background:linear-gradient(180deg,#f4dd8e,#caa23f);box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 2px 6px rgba(0,0,0,.4);font-family:var(--mono);font-size:.55rem;letter-spacing:.25em;color:#3a2a08;font-weight:800;text-transform:uppercase}
.slot{background:linear-gradient(180deg,#080604,#1a1410);height:36px;border-radius:8px;margin:0 auto .9rem;width:74%;box-shadow:inset 0 5px 14px rgba(0,0,0,.9),0 0 0 2px rgba(202,162,63,.35);position:relative;z-index: 5;}
.knob-wrap{display:flex;justify-content:center}
.knob{width:78px;height:78px;border-radius:50%;cursor:pointer;position:relative;transition:transform .1s;background:conic-gradient(from 0deg,#a07a24,#fbe8a0 25%,#d4a63e 40%,#fbe8a0 55%,#a07a24 70%,#fbe8a0 85%,#a07a24);box-shadow:0 6px 16px rgba(0,0,0,.6),inset 0 2px 4px rgba(255,255,255,.7),inset 0 -4px 8px rgba(100,70,20,.6)}
.knob::before{content:"";position:absolute;inset:8px;border-radius:50%;background:radial-gradient(circle at 38% 30%,#fff7e0,#e6c067 55%,#a87f2c);box-shadow:inset 0 2px 3px rgba(255,255,255,.6)}
.knob-cross{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.knob-cross::before{content:"";position:absolute;width:56%;height:5px;border-radius:2px;background:#7a5e1d}
.knob-cross::after{content:"";position:absolute;width:5px;height:56%;border-radius:2px;background:#7a5e1d}
@keyframes turn{to{transform:rotate(720deg)}}
.knob.turning{animation:turn .95s cubic-bezier(.4,0,.3,1)}
.knob:hover:not(.turning){transform:scale(1.06)}
.feet{display:flex;justify-content:space-between;width:76%;margin:-2px auto 0}
.foot{width:28px;height:14px;border-radius:0 0 8px 8px;background:linear-gradient(180deg,#34384a,#22252f);box-shadow:0 4px 8px rgba(0,0,0,.4)}
.hint{margin-top:1.2rem;font-family:var(--mono);font-size:.62rem;letter-spacing:.15em;color:var(--ink-dim);text-align:center;min-height:1.2em}
.err{color:var(--pop)}

/* 飛び出すリアルカプセルの演出 */
.ejected-capsule {
  position: fixed;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  z-index: 180;
  pointer-events: none;
  box-shadow: inset 0 -8px 12px rgba(0,0,0,0.5), 0 12px 30px rgba(0,0,0,0.7);
}
.ejected-capsule::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; height: 50%;
  border-radius: 27px 27px 0 0;
  background: rgba(255,255,255,0.4);
}
@keyframes capsuleEject {
  0% { transform: translate(-50%, -50%) scale(0.4) rotate(0deg); opacity: 0; filter: blur(0); }
  15% { opacity: 1; }
  45% { transform: translate(-50%, -180px) scale(1.6) rotate(180deg); }
  80% { transform: translate(-50%, 20px) scale(4) rotate(360deg); opacity: 1; filter: blur(0); }
  100% { transform: translate(-50%, 40px) scale(6.5) rotate(410deg); opacity: 0; filter: blur(6px); }
}

.fly{position:fixed;width:56px;height:56px;border-radius:50%;z-index:50;pointer-events:none;box-shadow:inset 0 -7px 11px rgba(0,0,0,.25),inset 0 6px 8px rgba(255,255,255,.5),0 6px 16px rgba(0,0,0,.4)}
.fly::before{content:"";display:block;height:50%;border-radius:50% 50% 0 0/100% 100% 0 0;background:rgba(255,255,255,.4)}
.fly.gold{background:linear-gradient(180deg,#f4dd8e,#caa23f);box-shadow:0 0 18px rgba(230,192,103,.85)}
.fly.iris{background:conic-gradient(from 0deg,#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff,#ff5f6d);box-shadow:0 0 26px rgba(255,255,255,.85)}

.results{margin-top:2.2rem;display:grid;gap:1rem;grid-template-columns:1fr}
@media(min-width:640px){.results{grid-template-columns:repeat(3,1fr)}}
.npc{background:var(--card);border:1px solid var(--card-edge);border-radius:16px;padding:1.2rem;position:relative;opacity:0;transform:translateY(16px) scale(.95)}
.npc.show{animation:pop .55s cubic-bezier(.2,1.3,.4,1) forwards}
@keyframes pop{to{opacity:1;transform:none}}
.npc .cap{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;box-shadow:inset 0 -5px 7px rgba(0,0,0,.25),inset 0 4px 5px rgba(255,255,255,.5)}
.npc .cap::before{content:"";display:block;height:50%;border-radius:50% 50% 0 0/100% 100% 0 0;background:rgba(255,255,255,.4)}
.npc .nm{font-family:var(--serif);font-size:1.4rem;font-weight:600;margin-top:.7rem;letter-spacing:.03em}
.npc .mt{font-family:var(--mono);font-size:.64rem;color:var(--ink-dim);letter-spacing:.1em}
.npc .role{color:var(--pop);font-weight:700;font-size:.92rem;margin:.15rem 0 .9rem}
.npc .f{margin-bottom:.7rem}.npc .f:last-child{margin-bottom:0}
.npc .k{font-family:var(--mono);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);display:block;margin-bottom:.15rem}
.npc .v{font-size:.9rem}.npc .v.q{font-family:var(--serif);font-style:italic}
.tags{margin-top:.8rem;display:flex;flex-wrap:wrap;gap:.35rem}
.tag{font-family:var(--mono);font-size:.54rem;letter-spacing:.08em;padding:.15rem .5rem;border-radius:20px;border:1px solid var(--line);color:var(--ink-dim)}

.npc.gold-c{grid-column:1/-1;border:2px solid var(--gold);background:linear-gradient(180deg,#1c1810,#14110a);box-shadow:0 0 30px rgba(230,192,103,.3),inset 0 0 30px rgba(230,192,103,.06);overflow:hidden}
.npc.gold-c::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,transparent 44%,rgba(255,240,190,.22) 50%,transparent 56%);background-size:250% 250%;animation:sheen 3.5s linear infinite}
.npc.gold-c .badge{display:inline-block;font-family:var(--mono);font-size:.58rem;letter-spacing:.3em;padding:.2rem .7rem;border-radius:20px;margin-bottom:.4rem;background:linear-gradient(90deg,#f4dd8e,#caa23f);color:#2a1f08;font-weight:800}
.npc.gold-c .nm{font-size:1.6rem;color:#f4dd8e}
.npc.iris-c{grid-column:1/-1;border:3px solid transparent;background:linear-gradient(#0e0f16,#0e0f16) padding-box,conic-gradient(from var(--ang,0deg),#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff,#ff5f6d) border-box;animation:pop .6s cubic-bezier(.2,1.3,.4,1) forwards,spinBorder 4s linear infinite;box-shadow:0 0 56px rgba(180,140,255,.5);overflow:hidden}
.npc.iris-c::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.22) 50%,transparent 60%);background-size:250% 250%;animation:sheen 2.6s linear infinite}
.npc.iris-c::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.12;background:conic-gradient(from 0deg,#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff,#ff5f6d)}
@property --ang{syntax:"<angle>";inherits:false;initial-value:0deg}
@keyframes spinBorder{to{--ang:360deg}}
@keyframes sheen{to{background-position:-150% -150%}}
.npc.iris-c .badge{position:relative;display:inline-block;font-family:var(--mono);font-size:.62rem;letter-spacing:.32em;padding:.22rem .8rem;border-radius:20px;margin-bottom:.45rem;background:linear-gradient(90deg,#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff);background-size:220% auto;color:#14110a;font-weight:800;animation:shift 3s linear infinite}
@keyframes shift{to{background-position:220% center}}
.npc.iris-c .nm{position:relative;font-size:1.9rem;background:linear-gradient(90deg,#ff8a93,#ffd79b,#9bf0c3,#8cc4ff,#cf9bff);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shift 4s linear infinite}
.npc.gold-c .grid2,.npc.iris-c .grid2{display:grid;gap:.7rem 1.4rem;position:relative}
@media(min-width:560px){.npc.gold-c .grid2,.npc.iris-c .grid2{grid-template-columns:1fr 1fr}}
.npc.iris-c .role{color:#ffd79b}.npc.iris-c .mt,.npc.iris-c .k{color:#b9b2d0}

.cutin-overlay{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition: opacity 0.15s ease}
.cutin-overlay.active{opacity:1;pointer-events:auto}
.cutin-bg{position:absolute;inset:0;background:#000;opacity:0}
.cutin-flash{position:absolute;inset:0;opacity:0}
.cutin-flash.gold-f{background:radial-gradient(circle,#fff0be,#e6c067 40%,transparent 70%)}
.cutin-flash.iris-f{background:conic-gradient(from 0deg,#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff,#ff5f6d)}
.cutin-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--serif);font-size:clamp(2rem,10vw,5rem);font-weight:900;letter-spacing:.2em;opacity:0;text-shadow:0 0 30px rgba(255,255,255,0.8), 0 0 60px currentColor}
.cutin-subtext{font-size: clamp(1rem, 3vw, 1.8rem); font-family: var(--mono); font-weight: 800; letter-spacing: 0.4em; margin-top: 1rem; color: #fff; text-shadow: 0 0 10px #000}
.cutin-text.gold-t{color:#f4dd8e}
.cutin-text.iris-t{background:linear-gradient(90deg,#ff8a93,#ffd79b,#9bf0c3,#8cc4ff,#cf9bff);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shift 1s linear infinite}
.cutin-crack{position:absolute;inset:0;opacity:0;overflow:hidden}
.cutin-crack .line{position:absolute;background:rgba(255,255,255,.9);box-shadow:0 0 20px 6px rgba(255,255,255,.7),0 0 60px 12px rgba(180,140,255,.5)}
.cutin-particle{position:absolute;width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 10px 3px rgba(180,140,255,.7);opacity:0}
.flash-layer{position:fixed;inset:0;z-index:150;pointer-events:none;opacity:0;mix-blend-mode:screen}
.flash-layer.gold-fl{background:radial-gradient(circle,#fff0be,#e6c067 40%,transparent 70%)}
.flash-layer.iris-fl{background:conic-gradient(from 0deg,#ff5f6d,#ffc371,#7ee8a2,#3aafff,#b06bff,#ff5f6d)}
.flash-layer.go{animation:flashBoom 1.2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards}
@keyframes flashBoom{0%{opacity:0;transform:scale(.1);border-radius:50%}15%{opacity:1}40%{opacity:0.8;transform:scale(1.2);border-radius:20px}100%{opacity:0;transform:scale(2.5);border-radius:0}}
.confetti{position:fixed;z-index:160;pointer-events:none;width:10px;height:14px;top:-20px}

/* デバッグ用UIスタイル */
.debug-toggle-btn { position: fixed; bottom: 10px; left: 10px; background: #222; border: 1px solid #444; color: #888; font-size: 10px; padding: 4px 8px; border-radius: 4px; cursor: pointer; z-index: 999; font-family: var(--mono); }
.debug-toggle-btn.active { background: #8a1a1a; color: #fff; border-color: #f55; }
.debug-panel { position: fixed; bottom: 40px; left: 10px; background: rgba(10,12,20,0.95); border: 2px dashed #f55; border-radius: 8px; padding: 10px; z-index: 998; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
.debug-panel h4 { font-size: 11px; margin-bottom: 6px; color: #f55; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }
.debug-btns { display: flex; flex-direction: column; gap: 5px; }
.debug-btn { background: #1c1f30; border: 1px solid #3b4261; color: var(--ink); padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; font-weight: bold; text-align: left; }
.debug-btn:hover { background: #2b304a; }
.debug-btn.iris-dbg { border-color: #b06bff; color: #cf9bff; }
.debug-btn.gold-dbg { border-color: #caa23f; color: #f4dd8e; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">TTRPG / Story GM Tool</div>
    <h1>NPCガチャ</h1>
    <div class="sub">CAPSULE ROSTER ULTRA PREMIUM</div>
  </header>
  <div class="panel">
    <div class="controls">

        {opacity:1,transform:"scale(1.15) rotate(0)",offset:.75},
        {opacity:0,transform:"scale(0.5) rotate(5deg)"}
      ],{duration:1600,fill:"forwards",easing:"cubic-bezier(0.15, 0.85, 0.35, 1)"});
    },2000);

    setTimeout(function(){
      cB.animate([{opacity:1},{opacity:0}],{duration:500,fill:"forwards"});
    },3300);

    setTimeout(function(){
      cE.classList.remove("active");
      cB.style.opacity=0;
      cC.style.opacity=0;
      fL.className="flash-layer";
      res();
    },3800);
  });
}

function spawnPhysicalCapsule(tier) {
  return new Promise(function(resolve) {
    var capsule = document.createElement("div");
    capsule.className = "ejected-capsule";
    
    if (tier === "iris") {
      capsule.style.background = "conic-gradient(from 0deg, #ff5f6d, #ffc371, #7ee8a2, #3aafff, #b06bff, #ff5f6d)";
      capsule.style.boxShadow = "0 0 30px rgba(255,255,255,0.8), inset 0 -8px 12px rgba(0,0,0,0.5)";
    } else if (tier === "gold") {
      capsule.style.background = "linear-gradient(135deg, #fbf3da, #e6c067, #b8923c)";
      capsule.style.boxShadow = "0 0 20px rgba(230,192,103,0.8), inset 0 -8px 12px rgba(0,0,0,0.5)";
    } else {
      capsule.style.background = p(CC);
    }
    
    var slotRect = document.getElementById("machineSlot").getBoundingClientRect();
    capsule.style.left = (slotRect.left + slotRect.width / 2) + "px";
    capsule.style.top = (slotRect.top + slotRect.height / 2) + "px";
    
    document.body.appendChild(capsule);
    capsule.style.animation = "capsuleEject 1.1s cubic-bezier(0.25, 1, 0.5, 1) forwards";
    
    setTimeout(function() {
      capsule.remove();
      resolve();
    }, 1100);
  });
}

var knob=document.getElementById("knob"),dome=document.getElementById("dome"),hint=document.getElementById("hint"),results=document.getElementById("results");
var busy=false;

function sl(ms){return new Promise(function(r){setTimeout(r,ms)})}

function roll(){
  if(busy)return;var tones=aT();
  if(tones.length===0){hint.innerHTML='<span class="err">雰囲気を1つ以上選んでね</span>';return}
  busy=true;hint.textContent="ガチャガチャ…";
  knob.classList.add("turning");dome.classList.add("shaking");
  
  var rT = null;
  if (forceResult) {
    rT = forceResult;
  } else {
    var r = Math.random();
    if(r<IR) rT="iris"; else if(r<IR+GR) rT="gold";
  }
  
  var rI=rT?Math.floor(Math.random()*3):-1;
  
  sl(800).then(function(){
    dome.classList.remove("shaking");
    if(rT==="iris"){
      dome.classList.add("charge-iris");
      knob.classList.remove("turning");
      return sl(1200).then(function(){ 
        dome.classList.remove("charge-iris"); 
        return spawnPhysicalCapsule("iris");
      }).then(function(){
        return irisCutin(); 
      });
    }
    else if(rT==="gold"){
      dome.classList.add("charge-gold");
      knob.classList.remove("turning");
      return sl(400).then(function(){ 
        dome.classList.remove("charge-gold"); 
        return spawnPhysicalCapsule("gold");
      }).then(function(){
        return goldCutin(); 
      });
    }
    else{
      knob.classList.remove("turning");
      return spawnPhysicalCapsule("normal").then(function(){ return sl(150); });
    }
  }).then(function(){
    results.innerHTML="";var npcs=[];
    for(var i=0;i<3;i++){if(i===rI)npcs.push(rT==="iris"?mI():mG());else npcs.push(mN(tones))}
    if(rT){
      fL.className="flash-layer "+(rT==="iris"?"iris-fl":"gold-fl")+" go";
      sC(rT);
      setTimeout(function(){fL.className="flash-layer"},1200);
    }
    npcs.forEach(function(n,i){fR(n,i)});
    hint.textContent=rT==="iris"?"🌈🌈 虹レア降臨！全宇宙が祝福している！ 🌈🌈":rT==="gold"?"★ ゴールド — ネームド排出! ★":"ハンドルを回す → 3人 排出";
    setTimeout(function(){busy=false},1100);
  });
}

function fR(n,i){
  var color=CC[i%CC.length];
  var slot=document.getElementById("machineSlot").getBoundingClientRect();
  var fly=document.createElement("div");
  fly.className="fly"+(n.tier==="iris"?" iris":n.tier==="gold"?" gold":"");
  if(n.tier==="normal")fly.style.background=color;
  
  var startLeft = slot.left + window.scrollX + slot.width / 2 - 28;
  var startTop = slot.top + window.scrollY;
  fly.style.left=startLeft+"px";fly.style.top=startTop+"px";
  
  document.body.appendChild(fly);
  var dx=Math.random()*120-60;
  fly.animate([{transform:"translate(0,0) scale(.6)",opacity:0},{transform:"translate("+(dx*.4)+"px,40px) scale(1.1)",opacity:1,offset:.3},{transform:"translate("+dx+"px,260px) scale(1)",opacity:1,offset:.85},{transform:"translate("+dx+"px,320px) scale(.4)",opacity:0}],{duration:720+i*120,easing:"cubic-bezier(.4,0,.4,1)"});
  setTimeout(function(){fly.remove()},720+i*120);
  setTimeout(function(){
    var el=document.createElement("div");
    var modeLabel=mode==="modern"?"現代":"ファンタジー";
    if(n.tier==="iris"){
      el.className="npc iris-c";
      el.innerHTML='<div class="badge">✦ IRIS ✦ '+n.kind+'</div><div class="nm">'+n.name+'</div><div class="mt">'+n.meta+' · 主役級</div><div class="role">'+n.role+'</div><div class="grid2"><div class="f"><span class="k">Profile</span><div class="v">'+n.desc+'</div></div><div class="f"><span class="k">Signature line</span><div class="v q">「'+n.quote+'」</div></div></div><div class="tags"><span class="tag">IRIS 1%</span><span class="tag">'+modeLabel+'</span><span class="tag">'+n.kind+'</span></div>';
    } else if(n.tier==="gold"){
      el.className="npc gold-c";
      el.innerHTML='<div class="badge">★ GOLD ★ ネームド</div><div class="nm">'+n.name+'</div><div class="mt">'+n.meta+' · '+n.title+'</div><div class="role">'+n.role+'</div><div class="grid2"><div class="f"><span class="k">Profile</span><div class="v">'+n.desc+'</div></div><div class="f"><span class="k">Signature line</span><div class="v q">「'+n.quote+'」</div></div></div><div class="tags"><span class="tag">GOLD 3%</span><span class="tag">'+modeLabel+'</span><span class="tag">ネームド級</span></div>';
    } else {
      el.className="npc";
      var tH=n.tones.map(function(t){return '<span class="tag">'+TS[t]+'</span>'}).join("");
      var mx=n.tones.length>1?'<span class="tag" style="color:var(--gold);border-color:var(--gold)">'+TS[n.tones[0]]+'×'+TS[n.tones[1]]+'</span>':"";
      el.innerHTML='<div class="cap" style="background:'+color+'"></div><div class="mt">No.'+String(i+1).padStart(2,"0")+'</div><div class="nm">'+n.name+'</div><div class="mt">'+n.meta+'</div><div class="role">'+n.role+'</div><div class="f"><span class="k">Voice</span><div class="v">'+n.speech+'</div></div><div class="f"><span class="k">Wants</span><div class="v q">「'+n.want+'」</div></div><div class="f"><span class="k">Hook</span><div class="v">'+n.hook+'</div></div><div class="tags">'+(mx||tH)+'</div>';
    }
    results.appendChild(el);
    requestAnimationFrame(function(){el.classList.add("show")});
  },420+i*150);
}

function sC(tier){
  var cols=tier==="iris"?["#ff5f6d","#ffc371","#7ee8a2","#3aafff","#b06bff","#ffe66d"]:["#f4dd8e","#e6c067","#caa23f","#fff0be","#b8923c"];
  var ct=tier==="iris"?150:55;
  for(var i=0;i<ct;i++){
    var c=document.createElement("div");c.className="confetti";
    c.style.left=Math.random()*100+"vw";c.style.background=cols[i%cols.length];
    c.style.transform="rotate("+Math.random()*360+"deg)";
    document.body.appendChild(c);
    var vy=60+Math.random()*40,vr=Math.random()*720;
    c.animate([{transform:"translateY(0) rotate(0)",opacity:1},{transform:"translateY("+vy+"vh) rotate("+vr+"deg)",opacity:0}],{duration:1700+Math.random()*1300,easing:"cubic-bezier(.3,.6,.5,1)"});
    (function(el){setTimeout(function(){el.remove()},3000)})(c);
  }
}

/* ================== デバッグモード用ロジック ================== */
var dbgToggle = document.getElementById("debugToggle");
var dbgPanel = document.getElementById("debugPanel");

dbgToggle.addEventListener("click", function() {
  if (dbgPanel.style.display === "block") {
    dbgPanel.style.display = "none";
    dbgToggle.textContent = "DEBUG MODE: OFF";
    dbgToggle.classList.remove("active");
    forceResult = null;
  } else {
    dbgPanel.style.display = "block";
    dbgToggle.textContent = "DEBUG MODE: ON";
    dbgToggle.classList.add("active");
  }
});

document.getElementById("dbgIris").addEventListener("click", function() { if(busy){busy=false;} forceResult = "iris"; roll(); });
document.getElementById("dbgGold").addEventListener("click", function() { if(busy){busy=false;} forceResult = "gold"; roll(); });
document.getElementById("dbgNormal").addEventListener("click", function() { if(busy){busy=false;} forceResult = null; roll(); });

knob.addEventListener("click", function() { forceResult = null; roll(); }); 
knob.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault(); forceResult = null; roll();}});
})();
</script>
